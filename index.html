<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VetShare | Clinical Network</title>
  <style>
    :root {
      --cyan: #27C3EA;
      --accent: #9B27B0;
      --bg: #05070a;
      --panel: #0d1117;
      --border: #30363d;
      --success: #238636;
    }

    * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
    body { background: var(--bg); color: #c9d1d9; margin: 0; padding: 20px; display: flex; justify-content: center; }

    .terminal {
      width: 100%;
      max-width: 900px;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 10px 50px rgba(0,0,0,0.8);
    }

    .brand { text-align: center; margin-bottom: 2rem; border-bottom: 2px solid var(--cyan); padding-bottom: 1rem; }
    .brand h1 { margin: 0; font-size: 2.2rem; letter-spacing: 2px; color: #fff; }
    .brand span { color: var(--cyan); font-size: 0.8rem; letter-spacing: 5px; }

    input, textarea {
      width: 100%;
      background: #010409;
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px;
      color: #fff;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    input:focus, textarea:focus { outline: 1px solid var(--cyan); border-color: var(--cyan); }
    textarea { height: 100px; }
    
    input[type="file"] {
      padding: 10px;
      border: 1px dashed var(--border);
      background: rgba(255, 255, 255, 0.02);
      cursor: pointer;
    }
    input[type="file"]::file-selector-button {
      background: var(--border); color: #fff; border: none; padding: 6px 12px; border-radius: 4px; margin-right: 10px; cursor: pointer; transition: 0.2s;
    }
    input[type="file"]::file-selector-button:hover { background: var(--cyan); color: #000; }

    .btn { padding: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; transition: 0.3s; text-transform: uppercase; }
    .btn-glow { background: var(--cyan); color: #000; width: 100%; box-shadow: 0 0 15px rgba(39,195,234,0.3); }
    .btn-glow:hover { background: #fff; transform: scale(1.01); }
    .btn-outline { background: transparent; border: 1px solid var(--cyan); color: var(--cyan); }

    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; }
    #dashboard { display: none; margin-top: 2rem; }
    .status-bar { font-size: 0.8rem; color: var(--cyan); margin-bottom: 20px; display: flex; align-items: center; }
    .dot { height: 8px; width: 8px; background: var(--success); border-radius: 50%; margin-right: 10px; box-shadow: 0 0 10px var(--success); }

    .card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-top: 15px; }
    .card-header { display: flex; justify-content: space-between; color: var(--cyan); font-weight: bold; flex-wrap: wrap; gap: 10px; }
    .card-meta { font-size: 0.8rem; opacity: 0.7; margin: 5px 0 15px 0; }
    .card-text { font-size: 0.9rem; margin-bottom: 10px; white-space: pre-wrap; word-break: break-word; line-height: 1.5; }
    .card-label { color: var(--accent); font-weight: bold; font-size: 0.85rem; display: block; margin-bottom: 2px; }

    .loader { display: none; text-align: center; color: var(--cyan); font-family: monospace; padding: 10px; }
    
    /* Sync Success Overlay */
    #sync-overlay {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: var(--panel);
      border: 2px solid var(--cyan);
      padding: 2rem;
      z-index: 100;
      text-align: center;
      border-radius: 8px;
      box-shadow: 0 0 50px rgba(0,0,0,1);
    }

    .query-spinner {
      display: none;
      color: var(--accent);
      font-family: monospace;
      font-size: 0.9rem;
      margin-top: 10px;
      animation: pulse 1.5s infinite ease-in-out;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }
    
    .img-preview { width: 80px; height: 80px; object-fit: cover; border-radius: 4px; border: 1px solid var(--border); }
  </style>
</head>
<body>

<div id="sync-overlay">
    <div id="sync-animation" style="color: var(--cyan); font-family: monospace; font-size: 1.2rem; margin-bottom: 10px;">UPDATING ARCHIVE...</div>
    <div id="sync-msg" style="display:none; color: var(--success); font-weight: bold;">
        ✓ CLINICAL RECORD SYNCED TO VETSHARE
    </div>
</div>

<div class="terminal">
  <div class="brand">
    <h1>VETSHARE</h1>
    <span>CLINICAL REPOSITORY v2.4</span>
  </div>

  <div id="loader" class="loader">LOGGING YOU IN...</div>

  <div id="auth">
    <input type="text" id="user" placeholder="VETERINARIAN ID">
    <input type="password" id="pass" placeholder="ACCESS KEY">
    <div class="grid">
      <button class="btn btn-glow" onclick="handleAuth('login')">Log In</button>
      <button class="btn btn-outline" onclick="handleAuth('register')">Register Terminal</button>
    </div>
  </div>

  <div id="dashboard">
    <div class="status-bar">
      <div class="dot"></div> LINK ACTIVE: <span id="active-user" style="margin-left:5px"></span>
    </div>

    <div style="border-left: 2px solid var(--cyan); padding-left: 20px;">
      <h3 style="margin-top:0">NEW CLINICAL ENTRY</h3>
      <div class="grid">
        <input type="text" id="uid" placeholder="Identifier">
        <input type="text" id="name" placeholder="Patient Name">
        <input type="text" id="breed" placeholder="Species / Breed">
      </div>
      <div class="grid">
        <input type="text" id="weight" placeholder="Weight (kg)">
        <input type="text" id="ageSex" placeholder="Age / Sex">
      </div>
      <textarea id="history" placeholder="History & Observations"></textarea>
      <textarea id="physical" placeholder="Physical Exam Notes"></textarea>
      <textarea id="analysis" placeholder="Clinical Analysis"></textarea>
      <textarea id="action" placeholder="Treatment Action Plan"></textarea>
      
      <div style="margin-bottom: 1rem;">
        <label style="font-size: 0.8rem; color: var(--cyan); display: block; margin-bottom: 5px;">ATTACH SCANS/IMAGES (MAX 3):</label>
        <input type="file" id="images" accept="image/*" multiple>
      </div>

      <button class="btn btn-glow" onclick="uploadCase()">Commit to Records</button>
    </div>

    <div style="margin-top: 4rem; border-left: 2px solid var(--accent); padding-left: 20px;">
      <h3 style="color: var(--accent)">SEARCH ARCHIVE HERE</h3>
      <div style="display: flex; gap: 10px;">
        <input type="text" id="search" placeholder="Search all records (name, breed, symptoms, etc.)...">
        <button class="btn btn-outline" style="width:120px" onclick="searchArchive()">Query</button>
      </div>
      
      <div id="query-loader" class="query-spinner">[ /// ] QUERYING RECORDS...</div>
      
      <div id="results"></div>
    </div>
  </div>
</div>

<script>
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyrUFfxv5kBM0q9Q8anYubW48Zmf9wUq-zDLFPFle_UE8F80GMAlj9JFJJ3RwxCTBl4RA/exec"; 
  let currentVet = null;

  async function api(payload, loaderId = 'loader') {
    const loaderElem = document.getElementById(loaderId);
    if(loaderElem) loaderElem.style.display = 'block';
    
    try {
      const response = await fetch(SCRIPT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      if(loaderElem) loaderElem.style.display = 'none';
      return await response.json();
    } catch (e) {
      if(loaderElem) loaderElem.style.display = 'none';
      alert("Network Error: Connection Timed Out");
      return { success: false };
    }
  }

  const toBase64 = file => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
  });

  async function handleAuth(mode) {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;
    if(!u || !p) return alert("Credentials missing.");

    const res = await api({ action: mode, username: u, password: p });
    if(res.success && mode === 'login') {
      currentVet = res.user;
      document.getElementById('auth').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';
      document.getElementById('active-user').innerText = currentVet.toUpperCase();
      // Auto-load all records on login
      searchArchive();
    } else {
      alert(res.msg || "Authentication Failure");
    }
  }

  async function uploadCase() {
    const fileInput = document.getElementById('images');
    if (fileInput.files.length > 3) return alert("Maximum of 3 images allowed.");

    let base64Images = [];
    if (fileInput.files.length > 0) {
      const filesArray = Array.from(fileInput.files);
      document.getElementById('loader').innerText = "ENCODING_IMAGE_DATA...";
      document.getElementById('loader').style.display = 'block';
      try {
        base64Images = await Promise.all(filesArray.map(file => toBase64(file)));
      } catch (err) {
        document.getElementById('loader').style.display = 'none';
        return alert("Failed to process images.");
      }
      document.getElementById('loader').innerText = "ESTABLISHING_LINK...";
    }

    const data = {
      action: 'feed',
      username: currentVet,
      uid: document.getElementById('uid').value,
      name: document.getElementById('name').value,
      breed: document.getElementById('breed').value,
      weight: document.getElementById('weight').value,
      ageSex: document.getElementById('ageSex').value,
      history: document.getElementById('history').value,
      physical: document.getElementById('physical').value,
      analysis: document.getElementById('analysis').value,
      actionData: document.getElementById('action').value,
      images: base64Images
    };

    const res = await api(data);
    
    if(res.success) {
      showSyncSuccess();
      document.querySelectorAll('#dashboard input[type="text"], #dashboard textarea').forEach(i => {
        if(i.id !== 'search') i.value = '';
      });
      fileInput.value = '';
      searchArchive(); // Refresh the list automatically
    } else {
        alert(res.msg);
    }
  }

  function showSyncSuccess() {
    const overlay = document.getElementById('sync-overlay');
    const anim = document.getElementById('sync-animation');
    const msg = document.getElementById('sync-msg');
    
    overlay.style.display = 'block';
    anim.style.display = 'block';
    msg.style.display = 'none';

    // Mock terminal animation
    let dots = 0;
    const interval = setInterval(() => {
        anim.innerText = "SYNCHRONIZING" + ".".repeat(dots % 4);
        dots++;
    }, 200);

    setTimeout(() => {
        clearInterval(interval);
        anim.style.display = 'none';
        msg.style.display = 'block';
        setTimeout(() => { overlay.style.display = 'none'; }, 2500);
    }, 2000);
  }

  async function searchArchive() {
    const q = document.getElementById('search').value;
    const box = document.getElementById('results');
    
    // Using query-loader for background sync
    const res = await api({ action: 'search', query: q }, 'query-loader');
    
    box.innerHTML = '';
    if(res.success && res.data.length > 0) {
      res.data.forEach(item => {
        let imagesHtml = '';
        if (item.images && item.images.length > 0) {
          imagesHtml = `<div style="display: flex; gap: 10px; margin-top: 15px; border-top: 1px dashed var(--border); padding-top: 10px; flex-wrap: wrap;">`;
          item.images.forEach(imgData => {
            imagesHtml += `<img src="${imgData}" class="img-preview" alt="Scan">`;
          });
          imagesHtml += `</div>`;
        }

        box.innerHTML += `
          <div class="card">
            <div class="card-header">
              <span>${item.name || 'UNKNOWN'}</span>
              <span>${item.uid || 'NO-UID'}</span>
            </div>
            <p class="card-meta">${item.breed || 'N/A'} | ${item.ageSex || 'N/A'} | ${item.weight || 'N/A'}</p>
            <div class="card-text"><span class="card-label">HISTORY:</span>${item.history || ''}</div>
            <div class="card-text"><span class="card-label">PHYSICAL:</span>${item.physical || ''}</div>
            <div class="card-text"><span class="card-label">ANALYSIS:</span>${item.analysis || ''}</div>
            <div class="card-text"><span class="card-label">PLAN:</span>${item.action || item.actionData || ''}</div>
            ${imagesHtml}
          </div>`;
      });
    } else {
      box.innerHTML = '<p style="text-align:center; opacity:0.5; font-family: monospace;">[!] NO_MATCHES_FOUND</p>';
    }
  }
</script>

</body>
</html>
